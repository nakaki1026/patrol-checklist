<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>巡回チェックリスト</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f4ff; font-family: 'Helvetica Neue', Arial, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const GAS_URL = "https://script.google.com/macros/s/AKfycbynelTSIlKvwfd2nTHGne_Ce6ihn1urnltmBwkWYyfgPO-kNtkRCHIcZ9fpB-h8mgIuKA/exec";

    const ITEMS = [
      { id: "shelf1", label: "レジ前の棚", icon: "🛒" },
      { id: "shelf2", label: "カップ麺コーナー横", icon: "🍜" },
    ];

    function getJST() {
      return new Date().toLocaleString("ja-JP", {
        timeZone: "Asia/Tokyo",
        month: "2-digit", day: "2-digit",
        hour: "2-digit", minute: "2-digit",
      });
    }

    function getTodayJST() {
      return new Date().toLocaleDateString("ja-JP", {
        timeZone: "Asia/Tokyo",
        month: "2-digit", day: "2-digit",
      });
    }

    function App() {
      const [tab, setTab] = useState("check"); // "check" or "log"
      const [current, setCurrent] = useState(null);
      const [note, setNote] = useState("");
      const [name, setName] = useState("");
      const [saving, setSaving] = useState(false);
      const [logs, setLogs] = useState([]);
      const [loadingLogs, setLoadingLogs] = useState(false);
      const [selectedDate, setSelectedDate] = useState(getTodayJST());
      const [savedDates, setSavedDates] = useState([]);

      async function loadLogs() {
        setLoadingLogs(true);
        try {
          const res = await fetch(GAS_URL + "?action=getLogs");
          const data = await res.json();
          setLogs(data);
          const dates = [...new Set(data.map(r => r.time ? r.time.split(" ")[0] : ""))].filter(Boolean);
          setSavedDates(dates);
          if (dates.length > 0 && !dates.includes(selectedDate)) {
            setSelectedDate(dates[0]);
          }
        } catch(e) {
          setLogs([]);
        }
        setLoadingLogs(false);
      }

      function handleTabLog() {
        setTab("log");
        loadLogs();
      }

      function startRound() {
        setCurrent({
          id: Date.now(),
          time: getJST(),
          items: Object.fromEntries(ITEMS.map(i => [i.id, null])),
        });
        setNote("");
      }

      function setStatus(id, val) {
        if (!current) return;
        setCurrent(prev => ({ ...prev, items: { ...prev.items, [id]: val } }));
      }

      async function finishRound() {
        if (!current) return;
        setSaving(true);
        const record = {
          time: current.time,
          name: name,
          shelf1: current.items.shelf1 === true ? "異常なし" : "破損あり",
          shelf2: current.items.shelf2 === true ? "異常なし" : "破損あり",
          note: note,
        };
        try {
          await fetch(GAS_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(record),
          });
        } catch(e) {}
        setCurrent(null);
        setNote("");
        setSaving(false);
        alert("✅ スプレッドシートに保存しました！");
      }

      const allChecked = current && ITEMS.every(i => current.items[i.id] !== null) && name.trim() !== "";

      const filteredLogs = logs.filter(r => r.time && r.time.startsWith(selectedDate));
      const hasNG = (r) => r.shelf1 === "破損あり" || r.shelf2 === "破損あり";

      return (
        <div style={{ minHeight: "100vh", background: "#f0f4ff", maxWidth: "480px", margin: "0 auto" }}>

          {/* Header */}
          <div style={{ background: "#3b6ef5", padding: "20px 16px 0", color: "#fff" }}>
            <div style={{ fontSize: "12px", opacity: 0.8, letterSpacing: "1px" }}>PATROL CHECKLIST</div>
            <div style={{ fontSize: "22px", fontWeight: "bold", marginTop: "4px" }}>📋 巡回チェックリスト</div>

            {/* Tabs */}
            <div style={{ display: "flex", marginTop: "16px", gap: "4px" }}>
              <div onClick={() => setTab("check")} style={{
                padding: "10px 20px", cursor: "pointer", fontWeight: "bold", fontSize: "14px",
                borderRadius: "10px 10px 0 0",
                background: tab === "check" ? "#f0f4ff" : "transparent",
                color: tab === "check" ? "#3b6ef5" : "rgba(255,255,255,0.8)",
              }}>チェック</div>
              <div onClick={handleTabLog} style={{
                padding: "10px 20px", cursor: "pointer", fontWeight: "bold", fontSize: "14px",
                borderRadius: "10px 10px 0 0",
                background: tab === "log" ? "#f0f4ff" : "transparent",
                color: tab === "log" ? "#3b6ef5" : "rgba(255,255,255,0.8)",
              }}>ログ</div>
            </div>
          </div>

          <div style={{ padding: "16px" }}>

            {/* チェックタブ */}
            {tab === "check" && (
              <div>
                {!current && (
                  <button onClick={startRound} style={{
                    width: "100%", padding: "18px", background: "#3b6ef5", border: "none",
                    borderRadius: "14px", color: "#fff", fontSize: "17px", fontWeight: "bold",
                    cursor: "pointer", marginBottom: "16px", boxShadow: "0 4px 12px rgba(59,110,245,0.35)",
                  }}>
                    ＋ 巡回を開始する
                  </button>
                )}

                {current && (
                  <div style={{ background: "#fff", borderRadius: "16px", padding: "20px", boxShadow: "0 2px 12px rgba(0,0,0,0.08)" }}>
                    <div style={{ fontSize: "13px", color: "#888", marginBottom: "16px" }}>🕐 開始時刻：{current.time}</div>

                    <div style={{ fontSize: "12px", color: "#888", marginBottom: "6px" }}>👤 記入者名</div>
                    <input
                      value={name}
                      onChange={e => setName(e.target.value)}
                      placeholder="お名前を入力してください"
                      style={{
                        width: "100%", border: "1.5px solid #e5e7eb", borderRadius: "10px",
                        padding: "10px 12px", fontSize: "14px", color: "#333",
                        background: "#fafafa", marginBottom: "16px",
                      }}
                    />

                    {ITEMS.map((item, idx) => (
                      <div key={item.id} style={{
                        display: "flex", alignItems: "center", justifyContent: "space-between",
                        padding: "14px 0", borderBottom: idx < ITEMS.length - 1 ? "1px solid #f0f0f0" : "none",
                      }}>
                        <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
                          <span style={{ fontSize: "22px" }}>{item.icon}</span>
                          <span style={{ fontSize: "15px", fontWeight: "600", color: "#222" }}>{item.label}</span>
                        </div>
                        <div style={{ display: "flex", gap: "8px" }}>
                          <button onClick={() => setStatus(item.id, true)} style={{
                            padding: "8px 14px", borderRadius: "20px", fontWeight: "bold", fontSize: "13px", cursor: "pointer",
                            border: `2px solid ${current.items[item.id] === true ? "#22c55e" : "#d1d5db"}`,
                            background: current.items[item.id] === true ? "#22c55e" : "#fff",
                            color: current.items[item.id] === true ? "#fff" : "#9ca3af",
                          }}>異常なし</button>
                          <button onClick={() => setStatus(item.id, false)} style={{
                            padding: "8px 14px", borderRadius: "20px", fontWeight: "bold", fontSize: "13px", cursor: "pointer",
                            border: `2px solid ${current.items[item.id] === false ? "#ef4444" : "#d1d5db"}`,
                            background: current.items[item.id] === false ? "#ef4444" : "#fff",
                            color: current.items[item.id] === false ? "#fff" : "#9ca3af",
                          }}>破損あり</button>
                        </div>
                      </div>
                    ))}

                    <div style={{ fontSize: "12px", color: "#888", marginTop: "16px", marginBottom: "6px" }}>メモ（任意）</div>
                    <textarea
                      value={note}
                      onChange={e => setNote(e.target.value)}
                      placeholder="気になったこと・不審者の特徴など..."
                      style={{
                        width: "100%", minHeight: "64px", border: "1.5px solid #e5e7eb",
                        borderRadius: "10px", padding: "10px", fontSize: "14px",
                        resize: "vertical", color: "#333", background: "#fafafa",
                      }}
                    />

                    <button disabled={!allChecked || saving} onClick={finishRound} style={{
                      width: "100%", marginTop: "16px", padding: "16px", border: "none",
                      borderRadius: "14px", fontSize: "16px", fontWeight: "bold",
                      background: allChecked && !saving ? "#22c55e" : "#e5e7eb",
                      color: allChecked && !saving ? "#fff" : "#aaa",
                      cursor: allChecked && !saving ? "pointer" : "not-allowed",
                    }}>
                      {saving ? "⏳ 保存中..." : allChecked ? "✓ 記録して完了" : "名前と全項目を入力してください"}
                    </button>
                  </div>
                )}
              </div>
            )}

            {/* ログタブ */}
            {tab === "log" && (
              <div>
                {loadingLogs ? (
                  <div style={{ textAlign: "center", padding: "40px", color: "#888" }}>⏳ 読み込み中...</div>
                ) : logs.length === 0 ? (
                  <div style={{ textAlign: "center", padding: "40px", color: "#888" }}>記録がまだありません</div>
                ) : (
                  <div>
                    {/* 日付セレクター */}
                    <div style={{ marginBottom: "16px" }}>
                      <div style={{ fontSize: "12px", color: "#888", marginBottom: "8px" }}>📅 日付を選択</div>
                      <div style={{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
                        {savedDates.map(date => (
                          <div key={date} onClick={() => setSelectedDate(date)} style={{
                            padding: "6px 14px", borderRadius: "20px", fontSize: "13px",
                            fontWeight: "bold", cursor: "pointer",
                            background: selectedDate === date ? "#3b6ef5" : "#fff",
                            color: selectedDate === date ? "#fff" : "#555",
                            boxShadow: "0 1px 4px rgba(0,0,0,0.08)",
                          }}>{date}</div>
                        ))}
                      </div>
                    </div>

                    {/* その日のログ */}
                    <div style={{ fontSize: "13px", color: "#888", marginBottom: "10px" }}>
                      {selectedDate}の記録（{filteredLogs.length}件）
                    </div>
                    {filteredLogs.length === 0 ? (
                      <div style={{ textAlign: "center", padding: "20px", color: "#aaa" }}>この日の記録はありません</div>
                    ) : filteredLogs.map((r, i) => (
                      <div key={i} style={{
                        background: "#fff", borderRadius: "12px", padding: "14px 16px", marginBottom: "8px",
                        borderLeft: `4px solid ${hasNG(r) ? "#ef4444" : "#22c55e"}`,
                        boxShadow: "0 1px 6px rgba(0,0,0,0.06)",
                      }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <div>
                            <span style={{ fontSize: "13px", color: "#888" }}>{r.time}</span>
                            {r.name && <span style={{ fontSize: "13px", color: "#555", marginLeft: "8px" }}>👤 {r.name}</span>}
                          </div>
                          <span style={{
                            fontSize: "12px", fontWeight: "bold", padding: "4px 10px", borderRadius: "20px",
                            color: hasNG(r) ? "#ef4444" : "#22c55e",
                            background: hasNG(r) ? "#fef2f2" : "#f0fdf4",
                          }}>
                            {hasNG(r) ? "⚠ 破損あり" : "✓ 異常なし"}
                          </span>
                        </div>
                        <div style={{ marginTop: "8px", display: "flex", gap: "8px", flexWrap: "wrap" }}>
                          {ITEMS.map(item => (
                            <span key={item.id} style={{
                              fontSize: "12px", padding: "3px 10px", borderRadius: "20px",
                              background: r[item.id] === "破損あり" ? "#fef2f2" : "#f0fdf4",
                              color: r[item.id] === "破損あり" ? "#ef4444" : "#22c55e",
                            }}>
                              {item.icon} {item.label}：{r[item.id]}
                            </span>
                          ))}
                        </div>
                        {r.note && <div style={{ marginTop: "8px", fontSize: "12px", color: "#888" }}>📝 {r.note}</div>}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
